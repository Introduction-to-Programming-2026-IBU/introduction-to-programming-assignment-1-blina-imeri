{% extends "layout.html" %}

{% block body %}
    <h1>Register</h1>

    <!-- TODO: Create a form that POSTs to /register -->
    <form method="POST" action="/register">
        <!-- TODO: Add a text input for name -->
        <input type="text" name="name" placeholder="Name" required>

        <!-- TODO: Use a Jinja2 for loop to render one CHECKBOX per sport.
                   All checkboxes must share name="sport" so multiple
                   selections can be submitted together -->
        {% for sport in sports %}
            <input type="checkbox" name="sport" value="{{ sport }}">{{ sport }}<br>
        {% endfor %}
        <!-- TODO: Add a submit button -->
        <input type="submit" value="Register">
    </form>
{% endblock %}
